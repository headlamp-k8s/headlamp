name: practice automation workflow

on:
  push:
    branches:
      - winget-automation

jobs:
  practice-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout winget-automation
        uses: actions/checkout@v4
        with:
          ref: winget-automation
          token: ${{ secrets.KINVOLK_REPOS_TOKEN }}
          # we need the full history for the git tag command, so fetch all the branches
          fetch-depth: 0

      - name: Configure Git
        run: |
          user=${{github.actor}}
          if [ -z $user ]; then
            user=vyncent-t
          fi
          git config --global user.name "$user"
          git config --global user.email "$user@users.noreply.github.com"

      # Set up Node.js environment, pay attention to the version
      # Some features might not be available in older versions
      - name: Create node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: "21"

      # We set the latest tag as an environment variable before we use it in the next steps
      # note that we have to echo the variable to the environment file to make it available in the next steps
      - name: Set latest tag
        run: |
          echo "Setting latest tag"
          latestTag=$(git tag --list --sort=version:refname 'v*' | tail -1)
          # Remove the 'v' from the tag
          latestTag=${latestTag#v}
          echo "LATEST_HEADLAMP_TAG=$latestTag" >> $GITHUB_ENV
          echo $latestTag

      # Install winget dependencies
      # It is good to have a separate step for installing dependencies
      - name: Install winget dependencies
        run: |
          cd $GITHUB_WORKSPACE/app/windows/winget
          npm install

      # Run the winget script
      # We use the environment variable we set in the previous step
      # note: the $latestTag is not being set here and thus does not exist in the environment
      # this is because the environment is not shared between steps
      # that is why we have to echo the variable to the environment file in the previous step
      - name: Run winget script
        run: |
          echo "Running winget script"
          echo "Repository: ${{ github.repository }}"
          echo "Workspace: ${GITHUB_WORKSPACE}"
          echo $GITHUB_WORKSPACE
          pwd
          echo "LATEST_HEADLAMP_TAG: $LATEST_HEADLAMP_TAG"
          echo "LATEST_HEADLAMP_TAG: ${LATEST_HEADLAMP_TAG}"
          echo ${LATEST_HEADLAMP_TAG}
          cd $GITHUB_WORKSPACE/app/windows/winget
          node winget-create.js $LATEST_HEADLAMP_TAG $GITHUB_WORKSPACE/app/windows/winget

      - name: Print script finished
        run: |
          echo "Script finished"
          pwd
          cd $GITHUB_WORKSPACE/app/windows/winget
          ls

      - name: Checkout winget-pkgs
        uses: actions/checkout@v4
        with:
          repository: headlamp-k8s/winget-pkgs
          path: winget-pkgs
          token: ${{ secrets.KINVOLK_REPOS_TOKEN }}
          # we need the full history for the git tag command, so fetch all the branches
          fetch-depth: 0

      - name: Copy winget files
        run: |
          echo "Copying winget files"
          echo "Repository: ${{ github.repository }}"
          echo "Workspace: ${GITHUB_WORKSPACE}"
          pwd
          cd $GITHUB_WORKSPACE/app/windows/winget
          ls
          cd $GITHUB_WORKSPACE/app/windows/winget/$LATEST_HEADLAMP_TAG
          pwd
          ls
          cp -r $GITHUB_WORKSPACE/app/windows/winget/$LATEST_HEADLAMP_TAG $GITHUB_WORKSPACE/winget-pkgs/manifests/h/Headlamp/Headlamp

      - name: Create PR branch
        run: |
          user=${{github.actor}}
          if [ -z $user ]; then
            user=vyncent-t
          fi
          echo "Creating PR branch"
          echo "Repository: ${{ github.repository }}"
          echo "Workspace: ${GITHUB_WORKSPACE}"
          pwd
          echo "moving to winget-pkgs directory"
          cd $GITHUB_WORKSPACE/winget-pkgs
          pwd
          ls
          echo "moving to Headlamp directory"
          cd $GITHUB_WORKSPACE/winget-pkgs/manifests/h/Headlamp/Headlamp
          pwd
          ls
          git checkout -b "practice-winget-update-$LATEST_HEADLAMP_TAG"
          git add .
          git commit -m "Update winget packages for $LATEST_HEADLAMP_TAG"
          git push origin practice-winget-update-$LATEST_HEADLAMP_TAG
        env:
          GITHUB_TOKEN: ${{ secrets.KINVOLK_REPOS_TOKEN }}

      - name: Create Pull Request
        run: |
          user=${{github.actor}}
          if [ -z $user ]; then
            user=vyncent-t
          fi
          echo "Creating Pull Request "
          gh auth login --with-token <<< ${{ secrets.KINVOLK_REPOS_TOKEN }}
          gh pr create \
            --repo headlamp-k8s/winget-pkgs \
            --title "Update winget packages for $LATEST_HEADLAMP_TAG" \
            --body "This PR updates the winget packages for the Headlamp project to version $LATEST_HEADLAMP_TAG" \
            --base master \
            --head practice-winget-update-$LATEST_HEADLAMP_TAG \
